<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentChat</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232e5c46'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23e6f4ec' font-family='sans-serif'%3E%E7%BE%A4%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Claude 登录失效提示条（全局，检测到唤醒因鉴权失败时出现） -->
<div id="authBar" class="hidden">
  <span id="authText"></span>
  <button id="btnAuthLogin" data-i18n="auth_login">打开登录窗口</button>
  <button id="btnAuthRetry" data-i18n="auth_retry">已登录，重试</button>
</div>
<div id="app">
  <!-- ============ 左侧栏 ============ -->
  <aside id="sidebar">
    <header class="sb-head">
      <div class="logo">AgentChat</div>
      <div class="sb-actions">
        <button id="btnNew" class="icon-btn" title="新建">＋</button>
        <button id="btnSettings" class="icon-btn" title="设置">⚙</button>
      </div>
      <div id="newMenu" class="menu hidden">
        <div class="menu-item" data-act="new-agent" data-i18n="new_agent">新建 Agent</div>
        <div class="menu-item" data-act="new-group" data-i18n="new_group">新建群聊</div>
      </div>
    </header>
    <nav class="tabs">
      <button class="tab active" data-tab="chats" data-i18n="tab_chats">聊天</button>
      <button class="tab" data-tab="agents" data-i18n="tab_agents">Agent</button>
      <button class="tab" data-tab="discover" data-i18n="tab_discover">发现</button>
      <button class="tab" data-tab="library" data-i18n="tab_library">资源库</button>
    </nav>
    <div id="listChats" class="list"></div>
    <div id="listAgents" class="list hidden"></div>
    <div id="listDiscover" class="list hidden"></div>
    <div id="listLibrary" class="list hidden"></div>
  </aside>

  <!-- ============ 主区域 ============ -->
  <main id="main">
    <div id="empty" class="empty">
      <div class="empty-icon">💬</div>
      <div data-i18n="select_conv">选择一个会话开始</div>
    </div>
    <div id="chat" class="hidden">
      <header id="chatHead">
        <div class="head-info">
          <div id="chatTitle" class="title"></div>
          <div id="chatSub" class="sub"></div>
        </div>
        <!-- 压缩进行中的头部动画：文字 + 渐变流动小进度条（低调、不抢注意力） -->
        <div id="ctxProgress" class="hidden"><span id="ctxProgLabel"></span><span class="ctx-bar"></span></div>
        <button id="btnCtx" class="icon-btn hidden" title="查看上下文构成（/context，零 token）">📊</button>
        <button id="btnCompact" class="icon-btn hidden" title="压缩该 agent 的上下文">🧹</button>
        <button id="btnConvInfo" class="icon-btn">⋯</button>
      </header>
      <div id="banner" class="hidden"></div>
      <div id="msgs"></div>
      <!-- 过程动态：agent 正在想什么/用什么工具（只展示，不进聊天记录） -->
      <div id="actFeed" class="hidden"></div>
      <div id="typing" class="hidden"></div>
      <!-- 待发送附件条 -->
      <div id="attachBar" class="hidden"></div>
      <div id="composer">
        <button id="btnAttach" class="icon-btn" title="添加图片/文件">📎</button>
        <input type="file" id="fileInput" multiple class="hidden">
        <textarea id="input" rows="1" data-i18n-ph="input_ph" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
        <button id="btnSend" data-i18n="send">发送</button>
      </div>
      <div id="dropHint" class="hidden"><span data-i18n="drop_hint">松开以添加附件</span></div>
      <div id="spectateBar" class="hidden">
        <span data-i18n="spectating">你不在此会话中，正在旁观</span>
        <button id="btnJoin" data-i18n="join">加入</button>
      </div>
    </div>
    <!-- 资源库编辑器 -->
    <div id="lib" class="hidden">
      <header id="libHead">
        <div class="head-info">
          <div id="libTitle" class="title"></div>
          <div id="libSub" class="sub"></div>
        </div>
        <button id="libSplit" class="mini-btn hidden" data-i18n="split_pack">✂ 拆分</button>
        <button id="libNewFile" class="mini-btn" data-i18n="new_file">＋ 文件</button>
      </header>
      <div id="libFiles"></div>
      <div id="libEditorWrap"><textarea id="libEditor" spellcheck="false"></textarea></div>
      <div id="libBar">
        <span id="libStatus"></span>
        <button id="libSave" class="btn-primary" data-i18n="save">保存</button>
      </div>
    </div>
  </main>
</div>

<!-- ============ 弹窗 ============ -->
<div id="overlay" class="hidden">
  <!-- 新建 agent -->
  <div class="modal hidden" id="modalAgent">
    <h3 data-i18n="new_agent">新建 Agent</h3>
    <label><span data-i18n="f_name">名字</span><input id="agName" placeholder="推进者 / 挑刺者 / 协调员..."></label>
    <label><span data-i18n="f_model">模型</span><select id="agModel"></select></label>
    <label><span data-i18n="f_perm">权限</span><select id="agPerm"></select></label>
    <div class="hint" id="agPermHint"></div>
    <label><span data-i18n="f_cwd">工作目录</span><input id="agCwd" data-i18n-ph="cwd_ph" placeholder="留空则自动创建 workspaces/名字"></label>
    <label><span data-i18n="f_extra_dirs">额外目录</span><input id="agDirs" data-i18n-ph="extra_dirs_ph"></label>
    <label class="check-line"><input type="checkbox" id="agAsk"><span data-i18n="ask_perm">越权操作时弹窗问我（不勾则直接拒绝）</span></label>
    <label><span data-i18n="f_memo">备注</span><input id="agMemo" data-i18n-ph="memo_ph" placeholder="给自己看的一句话说明（职责在私聊里告诉它）"></label>
    <div class="sect" data-i18n="f_skills">技能</div>
    <div id="agSkills" class="check-list"></div>
    <div class="sect" data-i18n="f_memories">记忆</div>
    <div id="agMems" class="check-list"></div>
    <div class="modal-btns">
      <button class="btn-ghost" data-close data-i18n="cancel">取消</button>
      <button class="btn-primary" id="agCreate" data-i18n="create">创建</button>
    </div>
  </div>

  <!-- 编辑 agent -->
  <div class="modal hidden" id="modalAgentEdit">
    <h3 id="aeTitle"></h3>
    <label><span data-i18n="f_model">模型</span><select id="aeModel"></select></label>
    <label><span data-i18n="f_perm">权限</span><select id="aePerm"></select></label>
    <div class="hint" id="aePermHint"></div>
    <label><span data-i18n="f_extra_dirs">额外目录</span><input id="aeDirs" data-i18n-ph="extra_dirs_ph"></label>
    <label class="check-line"><input type="checkbox" id="aeAsk"><span data-i18n="ask_perm">越权操作时弹窗问我（不勾则直接拒绝）</span></label>
    <label><span data-i18n="f_memo">备注</span><input id="aeMemo"></label>
    <div class="sect" data-i18n="f_skills">技能</div>
    <div id="aeSkills" class="check-list"></div>
    <div class="sect" data-i18n="f_memories">记忆</div>
    <div id="aeMems" class="check-list"></div>
    <div class="hint" id="aeInfo"></div>
    <div class="modal-btns">
      <button class="btn-ghost" data-close data-i18n="cancel">取消</button>
      <button class="btn-primary" id="aeSave" data-i18n="save">保存</button>
    </div>
  </div>

  <!-- 新建群聊 -->
  <div class="modal hidden" id="modalGroup">
    <h3 data-i18n="new_group">新建群聊</h3>
    <label><span data-i18n="f_group_name">群名</span><input id="gpName"></label>
    <div class="sect" data-i18n="f_members">选择成员</div>
    <div id="gpMembers" class="check-list"></div>
    <label class="check-line"><input type="checkbox" id="gpIncludeMe" checked><span data-i18n="include_me">把我拉进群</span></label>
    <div class="modal-btns">
      <button class="btn-ghost" data-close data-i18n="cancel">取消</button>
      <button class="btn-primary" id="gpCreate" data-i18n="create">创建</button>
    </div>
  </div>

  <!-- 设置 -->
  <div class="modal hidden" id="modalSettings">
    <h3 data-i18n="settings">设置</h3>
    <label><span data-i18n="theme">主题</span>
      <select id="stTheme">
        <option value="dark" data-i18n="theme_dark">深色</option>
        <option value="light" data-i18n="theme_light">浅色</option>
      </select>
    </label>
    <label><span data-i18n="language">语言</span>
      <select id="stLang"><option value="zh">中文</option><option value="en">English</option></select>
    </label>
    <div class="sect" data-i18n="usage_sub">订阅用量</div>
    <div id="stUsage" class="usage-box"></div>
    <div id="stUsageFail" class="usage-fail hidden"></div>
    <!-- Session(5h) 用量预警：到阈值给正在干活的 agent 捎收尾提醒 -->
    <div class="sect" data-i18n="usage_warn_sect">用量预警（Session 5h）</div>
    <div class="usage-box">
      <label class="slider-row"><span data-i18n="warn_threshold">预警阈值</span>
        <input type="range" id="stWarnPct" min="30" max="95" step="5"><b id="stWarnPctV"></b></label>
      <label class="slider-row"><span data-i18n="poll_interval">查询间隔</span>
        <input type="range" id="stPollSec" min="60" max="900" step="60"><b id="stPollSecV"></b></label>
    </div>
    <div class="sect" data-i18n="usage_local">本系统消耗（近 5 小时）</div>
    <div id="stLocal" class="usage-box"></div>
    <div class="sect" data-i18n="skills_lib">技能库</div>
    <div id="stSkills" class="usage-box"></div>
    <div class="modal-btns">
      <button class="btn-danger" id="stShutdown" data-i18n="shutdown">关闭服务器</button>
      <button class="btn-ghost" data-close data-i18n="close">关闭</button>
    </div>
  </div>

  <!-- 上下文构成（📊 无头 /context 的输出） -->
  <div class="modal hidden" id="modalCtx">
    <h3 data-i18n="ctx_report">上下文构成</h3>
    <div id="ctxReport" class="ctx-report"></div>
    <div class="modal-btns">
      <button class="btn-ghost" data-close data-i18n="close">关闭</button>
    </div>
  </div>

  <!-- 会话设置 -->
  <div class="modal hidden" id="modalConv">
    <h3 data-i18n="conv_settings">会话信息</h3>
    <div id="cvNameRow"><label><span data-i18n="f_group_name">群名</span><input id="cvName"></label></div>
    <div class="sect" data-i18n="members">成员</div>
    <div id="cvMembers" class="member-list"></div>
    <div id="cvAddRow" class="add-row">
      <select id="cvAddSel"></select>
      <button id="cvAddBtn" class="btn-ghost" data-i18n="add_member">添加成员</button>
    </div>
    <label><span data-i18n="chain_limit">Agent 连发上限</span><input id="cvChain" type="number" min="1" style="width:90px"></label>
    <div class="hint" data-i18n="chain_hint">你不发言时 agent 最多累计连发多少条，超过自动暂停传递（防互聊刷额度）</div>
    <div class="modal-btns">
      <button class="btn-danger hidden" id="cvLeave" data-i18n="leave_group">退出群聊</button>
      <button class="btn-ghost" data-close data-i18n="close">关闭</button>
      <button class="btn-primary" id="cvSave" data-i18n="save">保存</button>
    </div>
  </div>
</div>

<div id="toast" class="hidden"></div>
<div id="permPanel"></div>

<!-- agent 提问选择卡：聊天区正中央浮层；多个提问竖排，可收起成底部小徽标 -->
<div id="askOverlay" class="hidden">
  <div id="askHead">
    <span id="askCount"></span>
    <button id="askCollapse"></button>
  </div>
  <div id="askList"></div>
</div>
<button id="askBadge" class="hidden"></button>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
